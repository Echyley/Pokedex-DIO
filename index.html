<!DOCTYPE html>
<html lang="pt-br">
<head>
	<title>DIOPokedex </title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!--Normalize CSS-->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
		integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />

	<!--Font Roboto-->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;500;700&display=swap" rel="stylesheet">

	<!--CSS-->
	<link rel="stylesheet" href="assets/css/global.css">
	<link rel="stylesheet" href="assets/css/pokedex.css">
	<link rel="stylesheet" href="assets/css/details.css">

</head>

<body>
	<main>
		<header>
			<div class="headerContent">
				<img width="350px" src="assets/css/img/PokedexLogo.png" alt="Logo">
			</div>
		</header>

		<section class="content">
			<ol id="pokemonList" class="pokemons">
				<!-- Pokemons goes here -->
			</ol>

			<div class="pagination">
				<button id="loadMoreButton" type="button">
					Load More
				</button>
			</div>
		</section>

		<!--POKEMON DETAILS-->
		<div id="modal-overlay">
			<div id="modal">
				<div>
					<h2></h2>
					<span id="number"></span>
				</div>
				<img src="" alt="">
				<img id="background-img" src="assets/css/img/background_modal.svg" alt="">
				<div class="details">
					<span id="species"></span>
					<span id="height"></span>
					<span id="weight"></span>
					<span id="abilities">Abilities: </span>
				</div>
				<button type="button" onclick="modalToggle()">
					<img src="assets/css/img/arrow.svg" alt="back" />
				</button>
			</div>
		</div>

	</main>

	<script src="assets/js/pokemon-model.js"></script>
	<script src="assets/js/poke-api.js"></script>
	<script src="assets/js/main.js"></script>
</body>

</html>
